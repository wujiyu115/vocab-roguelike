name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE: "stable"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-linux

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip
          unzip -o Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip
          chmod +x Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64

      - name: Download export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          cd /tmp
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          unzip -o Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.4.tres << SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          SETTINGS

      - name: Disable APK signing
        run: |
          sed -i 's|package/signed=true|package/signed=false|' word_realm/export_presets.cfg

      - name: Import project
        run: |
          ~/godot/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 --headless --import --path word_realm --quit 2>&1 || true

      - name: Export debug APK
        run: |
          mkdir -p build
          ~/godot/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 --headless --export-debug "Android" ../build/WordRealm.apk --path word_realm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WordRealm-Android
          path: build/WordRealm.apk
          if-no-files-found: error
