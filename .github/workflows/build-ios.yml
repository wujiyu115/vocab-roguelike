name: Build iOS Xcode Project

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE: "stable"

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/Library/Application Support/Godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-macos

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          curl -sLO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_macos.universal.zip
          unzip -o Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_macos.universal.zip
          chmod +x Godot.app/Contents/MacOS/Godot

      - name: Download export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "$TEMPLATES_DIR"
          cd /tmp
          curl -sLO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          unzip -o Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          mv templates/* "$TEMPLATES_DIR/"

      - name: Enable export project only
        run: |
          sed -i '' 's|application/export_project_only=false|application/export_project_only=true|' word_realm/export_presets.cfg

      - name: Set App Store Team ID
        env:
          # Optional: set an APP_STORE_TEAM_ID repo secret for signed device builds.
          # A placeholder is fine for the unsigned Simulator build below, since Godot
          # only requires this field to be non-empty to pass export validation.
          TEAM_ID: ${{ secrets.APP_STORE_TEAM_ID || 'AAAAAAAAAA' }}
        run: |
          sed -i '' "s|application/app_store_team_id=\"\"|application/app_store_team_id=\"$TEAM_ID\"|" word_realm/export_presets.cfg

      - name: Import project
        run: |
          ~/godot/Godot.app/Contents/MacOS/Godot --headless --import --path word_realm --quit 2>&1 || true

      - name: Export Xcode project
        run: |
          mkdir -p build/ios
          ~/godot/Godot.app/Contents/MacOS/Godot --headless --export-debug "iOS" ../build/ios/WordRealm --path word_realm

      - name: Build for iOS Simulator (unsigned)
        run: |
          cd build/ios
          xcodebuild build \
            -project WordRealm.xcodeproj \
            -scheme WordRealm \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath derived \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Simulator app
        run: |
          APP_PATH=$(find build/ios/derived -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/build/WordRealm-Simulator.zip" "$(basename "$APP_PATH")"
          fi

      - name: Upload Xcode project
        uses: actions/upload-artifact@v4
        with:
          name: WordRealm-iOS-Xcode
          path: build/ios/
          if-no-files-found: error

      - name: Upload Simulator build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WordRealm-iOS-Simulator
          path: build/WordRealm-Simulator.zip
          if-no-files-found: warn
