name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE: "stable"

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/Library/Application Support/Godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-macos

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          curl -sLO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_macos.universal.zip
          unzip -o Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_macos.universal.zip
          # The zip contains Godot.app
          chmod +x Godot.app/Contents/MacOS/Godot

      - name: Download export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "$TEMPLATES_DIR"
          cd /tmp
          curl -sLO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          unzip -o Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          mv templates/* "$TEMPLATES_DIR/"

      - name: Install Apple certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

          # Extract UUID for Godot export preset
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PP_PATH"))
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Configure export preset
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cd word_realm
          sed -i '' "s|application/app_store_team_id=\"\"|application/app_store_team_id=\"$IOS_TEAM_ID\"|" export_presets.cfg
          sed -i '' "s|application/provisioning_profile_uuid_release=\"\"|application/provisioning_profile_uuid_release=\"$PP_UUID\"|" export_presets.cfg
          sed -i '' "s|application/provisioning_profile_uuid_debug=\"\"|application/provisioning_profile_uuid_debug=\"$PP_UUID\"|" export_presets.cfg

      - name: Import project
        run: |
          ~/godot/Godot.app/Contents/MacOS/Godot --headless --import --path word_realm --quit 2>&1 || true

      - name: Export Xcode project
        run: |
          mkdir -p build/ios
          ~/godot/Godot.app/Contents/MacOS/Godot --headless --export-release "iOS" ../build/ios/WordRealm.xcodeproj --path word_realm

      - name: Build with xcodebuild
        run: |
          cd build/ios
          xcodebuild archive \
            -project WordRealm.xcodeproj \
            -scheme WordRealm \
            -configuration Release \
            -archivePath $RUNNER_TEMP/WordRealm.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.wordrealm.game</key>
                  <string>${PP_UUID}</string>
              </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/WordRealm.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WordRealm-iOS
          path: build/ipa/*.ipa
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
